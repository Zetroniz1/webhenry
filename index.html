<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Henry Stickman - Fullscreen</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; }
        #container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script src="https://jsdelivr.net"></script>

    <script>
        const swfUrl = "https://archive.org";

        async function initRuffle() {

            const RufflePlayer = window.RufflePlayer || {};
            
            if (!RufflePlayer.newest) {
                console.log("Ожидание инициализации Ruffle...");
                setTimeout(initRuffle, 200);
                return;
            }

            const ruffle = RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("container");
            container.appendChild(player);

            player.style.width = "100%";
            player.style.height = "100%";

            try {
                await player.load({
                    url: swfUrl,
                    autoplay: "on",
                    unmuteOnStart: true,
                    allowScriptAccess: true
                });
                console.log("Игра загружена!");
            } catch (err) {
                console.error("Ошибка при загрузке SWF:", err);

                alert("Ошибка загрузки!");
            }
        }

        window.addEventListener("load", () => {
            setTimeout(initRuffle, 500);
        });
    </script>
</body>
</html>
